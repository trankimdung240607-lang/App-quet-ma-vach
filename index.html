<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Quét Hàng - Tài Xế</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0A0A0A;
      color: #FFD700;
      font-family: 'Segoe UI', Arial, sans-serif;
      max-width: 420px;
      margin: 0 auto;
      height: 100vh;
      overflow: hidden;
      border: 12px solid #111;
      border-radius: 40px;
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
    }
    header {
      background: linear-gradient(90deg, #FFD700, #FFA500);
      color: #000;
      padding: 20px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
    }
    .tab-content { display: none; padding: 20px; height: calc(100vh - 180px); overflow-y: auto; }
    .tab-content.active { display: block; }

    /* Màn Home */
    .home { text-align: center; padding-top: 40px; }
    .big-number { font-size: 52px; font-weight: bold; margin: 10px 0; }
    .card {
      background: #1C1C1C;
      padding: 25px;
      border-radius: 20px;
      margin: 15px 0;
      border: 2px solid #FFD700;
    }

    /* Màn Quét */
    .scanner {
      height: 320px;
      border: 6px solid #FFD700;
      border-radius: 25px;
      position: relative;
      background: #111;
      margin: 20px 0;
    }
    .scanner::after {
      content: "📷 KHUNG QUÉT";
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 26px;
      font-weight: bold;
      color: #FFD700;
      border: 4px dashed #FFD700;
      padding: 30px 50px;
      border-radius: 15px;
    }

    button {
      width: 100%;
      padding: 28px;
      font-size: 28px;
      font-weight: bold;
      margin: 12px 0;
      border-radius: 20px;
      border: none;
      cursor: pointer;
    }
    .btn-primary { background: #FFD700; color: #000; }
    .btn-success { background: #22C55E; color: #000; }
    .btn-danger { background: #EF4444; color: white; }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      max-width: 420px;
      background: #111;
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
      border-top: 3px solid #FFD700;
    }
    .nav-item {
      text-align: center;
      color: #AAA;
      font-size: 22px;
      cursor: pointer;
    }
    .nav-item.active { color: #FFD700; }

    h2 { font-size: 32px; margin-bottom: 20px; }
  </style>
</head>
<body>

  <header>MÁY QUÉT HÀNG</header>

  <!-- Tab Home -->
  <div id="home" class="tab-content active">
    <div class="home">
      <p style="font-size:26px;">Chào chú Hùng 👋</p>
      <h2>Hôm nay</h2>
      <div class="big-number">12/15</div>
      <p style="font-size:24px;">Đơn đã giao</p>
      
      <div class="card">
        <p style="font-size:24px;">Đơn còn lại: <strong>3</strong></p>
      </div>
      
      <button class="btn-primary" onclick="switchTab(1)">📸 Bắt đầu quét ngay</button>
    </div>
  </div>

  <!-- Tab Quét -->
  <div id="scan" class="tab-content">
    <h2>Quét Mã Vạch</h2>
    <div class="scanner" id="scanArea"></div>
    <button class="btn-primary" onclick="startScan()">📸 QUÉT MÃ VẠCH</button>
    <button class="btn-success" onclick="completeTrip()">✅ HOÀN THÀNH CHUYẾN</button>
    <button class="btn-danger" onclick="callHelp()">🆘 GỌI HỖ TRỢ</button>
  </div>

  <!-- Tab Lịch sử -->
  <div id="history" class="tab-content">
    <h2>Lịch sử hôm nay</h2>
    <div class="card">
      <p><strong>DH-250625-7842</strong> - Hoàn thành lúc 08:45</p>
    </div>
    <div class="card">
      <p><strong>DH-250625-7841</strong> - Hoàn thành lúc 08:12</p>
    </div>
  </div>

  <!-- Tab Tôi -->
  <div id="profile" class="tab-content">
    <h2>Thông tin tài xế</h2>
    <div class="card">
      <p style="font-size:26px;">Chú Hùng - 52 tuổi</p>
      <p>Xe tải 15 tấn • 10 năm kinh nghiệm</p>
    </div>
    <button class="btn-primary" onclick="alert('Đã phát âm thanh hướng dẫn!')">🔊 Hướng dẫn sử dụng (Giọng nói)</button>
  </div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <div class="nav-item active" onclick="switchTab(0)">🏠</div>
    <div class="nav-item" onclick="switchTab(1)">📷</div>
    <div class="nav-item" onclick="switchTab(2)">📋</div>
    <div class="nav-item" onclick="switchTab(3)">👤</div>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      
      document.getElementById(['home','scan','history','profile'][tab]).classList.add('active');
      document.querySelectorAll('.nav-item')[tab].classList.add('active');
    }

    function startScan() {
      alert("✅ Quét thành công!\nMã đơn: DH-250625-7843\nTrạng thái: Đã cập nhật");
    }

    function completeTrip() {
      if (confirm("Xác nhận hoàn thành toàn bộ chuyến hôm nay?")) {
        alert("🎉 Chuyến hàng hoàn tất!\nChúc chú về xe an toàn.");
      }
    }

    function callHelp() {
      alert("🆘 Đang kết nối với Trưởng phòng Vận tải...\nChú Hùng, cháu sẽ hỗ trợ ngay!");
    }

    // Tự động chào khi mở app
    window.onload = () => {
      setTimeout(() => {
        alert("Ứng dụng đã sẵn sàng.\nChú đưa mã vạch vào khung quét nhé!");
      }, 800);
    };
  </script>
</body>
</html>
